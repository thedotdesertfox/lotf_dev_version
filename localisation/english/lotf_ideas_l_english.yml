 #Voting
 lotf_society_universal_suffrage:0 "Universal Suffrage"
 lotf_society_universal_suffrage_desc:0 "This state is fully committed to the idea that every adult person, no matter gender, race, religion, or any other factor, is entitled to vote in all matters of their Governance. "
 lotf_society_restricted_voting:0 "Nominal Suffrage"
 lotf_society_restricted_voting_desc:0 "Unlike some living under limited suffrage, very little liberty is given to those under nominal suffrage. Any choice one may have is more often than not inconsequential, and can be easily overruled by the central bureaucracy."
 lotf_society_elite_voting:0 "Limited Suffrage"
 lotf_society_elite_voting_desc:0 "Social hierarchy has entirely determined the ability to vote in this state. Those groups relatively closer to the top of the hierarchy may enjoy the freedoms often granted by universal suffrage, any group who happens to fall to the bottom however, have either heavy restrictions placed upon them or are completely disenfranchised. "
 lotf_society_no_voting:0 "No Suffrage"
 lotf_society_no_voting_desc:0 "Under this state, the government exercises absolute control over its policymaking, with no room for dissent or public opinion. "
