WSC_w_selden_washington_heir:0 "W. Selden Washington"
WSC_w_selden_washington_heir_desc:0 "A capable statesman, Seldon Washington currently serves as the Heir Presumptive of the Washington Dynasty. A Great-Great-Grandson of George Washington's brother, John Augustine Washington, he is perhaps Clarks best hope of figurehead to unite a fractured America behind."
