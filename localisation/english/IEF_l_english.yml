#IDEAS
IEF_international_army:0 "International Army"
IEF_international_army_desc:0 "When the League of Nations ordered Walter’s expedition into the Great Lakes, he was reinforced with a variety of foreign forces, mostly from the Commonwealth. However, due to the low support Walter’s temporary administration received from the local populace in Indiana and Illinois, he requested a constant flow of reinforcements from the Mandates to maintain his expeditionary force. British officers have improved the training regiments and professionality of the expedition, but due to being seen as an occupation force morale among the men has remained quite low."
IEF_unrest:0 "Noncompliant Populace"
IEF_unrest_desc:0 "Since the Force's establishment, unrest has plagued it from within. Much of the local populace has shunned the League as an occupying force and have called for it’s immediate withdrawal. However, rumors have surfaced that the supposedly defunct Patriotic Legion of America still waits in the shadows, preparing for their revenge against the League and destabilizing the mandate.\n \n \n But we defeated them already, right?" 
