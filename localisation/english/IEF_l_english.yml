league_is_here:0 "League Intervention Imminent"
league_is_here_desc:0 "The League has agreed to defend us, but due to strife within the mandates have so far been unable to directly help us during the war. However, if we manage to slow the Legionary advance but fail to take the capital, the league will directly join the war. Victory will be certain, but at a huge cost to our legitimacy."
#EVENTS
ief.1.t:0 "Gloryless"
ief.1.d:0 "On the eve of the Second American Civil War, Walter Bedell Smith had expressed feelings of loyalty towards the Federalist Movement, enlisting in the Southern Defense Command under George S. Patton. The south was an insurgent filled battlefield, and Walter frequently fought against Socialist partisan attacks throughout Dixie. Under the constant threat of socialist insurgent strikes, ruthless measures had to be taken against the civilians within insurgent areas, only dampening the morale of Federal troops. Eventually, the East Coast intervention by the League began, with eventual Federal declaration of war upon them. Walter had been sent to defend the flank of the Federal forces of Virginia, but despite their best efforts, were pushed back by the League. Walter retreated, a broken man, to when he met Charles Lindbergh. Lindbergh had recently formed a “veterans association” of former Federalist troops who were fighting against the League occupation. Walter agreed to join them, and advance towards the Great Lakes. However, as the campaign advanced, Walter learned the true nature of the organization. The Patriotic Legion of America, as it was called, was an ultranationalist organization, built upon militarism and violence. On their campaigns, mass repressions and executions against the civilian population under their fear of communism and foreigners soon left Walter disgusted. He defected after a horrific pogrom in Cincinnati, running towards the frontline with the League accompanied by his few loyal units. He realized he had to make a deal with the devil, as the Patriotic Legion to him was the greater threat to America. He notified the British commander of the Kentucky campaign, Roy Urquhart, of the Legionary plans to destroy the League and establish an ultranationalist state in Indiana. Now backed by League forces, the now “Traitor General” Walter launched an attack into the Legion’s command centers, eventually managing to destroy their remaining forces in the invasion. However, Lindbergh was nowhere to be found, and the decision to proclaim victory would come back to bite the occupation authority. In honor of his collaboration, the League appointed Walter as the governor general of Indiana and Illinois, hoping that he could eventually turn the states over to the League to expand the mandates. But this ideal was short lived, as the people of the two states began to openly resist the League’s authority, and rumors continue to circulate that Lindbergh is planning his revenge to topple Walter once and for all."
ief.1.a:0 "This path will not be easy."
ief.2.t:0 "CONFIDENTIAL - OPERATION 'HOOLIGAN'"
ief.2.d:0 "Instructions No 1\n      To: Brigadier-General W.B. Smith\n      Supreme Commander International Expeditionary Force\n       with 4 Infantry Division under Command.\n\n\n1. PRIMARY TASK\n      Your Primary task is to engage WARLORD forces EAST of the MISSISSIPPI\nand neutralize WARLORD presence by any means necessary.\n\n2. SECONDARY TASK\n      Your Secondary task is to secure SAINT LOUIS bridges and other key access points along the MISSISSIPPI, and enforce a blockade of all traffic\nattempting to cross.\n\n3. TERTIARY TASK\n      To secure stable LON administration of the region you are to:\n(a)   Subsume any local law enforcment into pre-existing military structure.\n\n(b)   Effect a rigorous anti-partisan campaign throught the countryside.\n\n(c)   Begin the construction of numerous fortifications and lookout stations at expedient locations along the MISSISSIPPI.\n\n4. ENEMY INFORMATION\n      Enemy forces are estimated to be composed primarily of poorly equipped militia and a small cadre of mobile elements.\nTotal strenght is believed to be no stronger then 7(SEVEN) regiments.\n\n\nHQ British Troops (Main)                                                          J.S.S.P. Vereker.\n    c/o APO Pennsylvania,	   	                                                            Field Marshal.\n    19 jan 36. 			                                     Commander British Expeditionary Force."
ief.2.a:0 "Simple."
ief.3.t:0 "The Smugglers Retreat!"
ief.3.d:0 "Our superiority predictably defeated the mafia over control of Little Egypt. This will bring great morale for our army and our people!"
ief.3.a:0 "Great work all around"
ief.4.t:0 "Hoover's Arrival"
ief.4.d:0 "WIP"
ief.4.a:0 "There is still much to be done."
ief.5.t:0 "Rebels in Indiana"
ief.5.d:0 "The bastards known as Gerald L. K. Smith and his goon Charles Lindbergh have taken control of Indiana proclaiming the American Redemption Authority against all foreigners, including us. They have decided to rise up now as we are preoccupied with battling it out with Saint Louis."
ief.5.a:0 "Fuck, let's handle Indiana before we enter Saint Louis"
ief.5.b:0 "The time has come patriots! Death to the traitors! (Play as Indiana)"
ief.6.t:0 "Riverine Warfare"
ief.6.d:0 "WIP"
ief.6.a:0 "These units will play a critical role in the battles to come."
ief.6.b:0 "This expertise must be disseminated to the wider army."

ief.10.t:0 "A French 'Gift'"
ief.10.d:0 "Walter B. Smith was suprised when the French agreed to provide additional reinforcements to his command, and was even more suprised when he was informed that nearly an entire division's worth of men and materiel would be arriving. He believed such a generous contribution, especially from a nation who can barely be considered a member of the LoN anymore, would have an ulterior motive. Upon their arrival this became apparent immediately, the vast majority of the soldiers sent to us had been charged as poltical dissidents; their commander, commandant Charels de Gaulle, once the protege of the dictator Philippe Pétain, he has since fallen out of favor and his deployment to America now serves as his political exile. In addition, the armored battalions that have been sent consist of very few 'modern' vehicles, there being only handful of R35s and FCM 36s in comparrison to the nearly 100 FT17s sent over."
ief.10.a:0 "So were just the dumping ground of Europe then?"
