OHI_neutrality_idea:0 "Destabilizing Refugee Influx"
OHI_neutrality_idea_desc:0 "After tens of thousands of men died between the Federalist and Socialists in Ohio during the Collapse, General Beightler along with the local population put an end to the senseless bloodshed. Expelling both forces out of most of the state, Beightler had established a temporary provisional government free from militant politics. Though Ohio now see peace, refugees with neighboring states have flooded the state hoping to be under Ohioan protection."
